# Apache HTTP virtual host sample for hosting the Flutter app and proxying API calls.
#
# This is intentionally HTTP-only and sanitized. Replace every example value
# before using it. Add HTTPS/Let's Encrypt settings in your own deployment.
#
# Expected behavior:
# - The Flutter web app is protected by Apache form auth outside trusted subnets.
# - Trusted LAN/VPN subnets can open the web app without Apache login.
# - /api/ bypasses Apache form auth and is protected by the irrigation gateway's
#   own Bearer token authentication.
# - Android/iOS clients can call http://irigatie.example.test/api with the API
#   token and do not need Apache browser-session login.

<VirtualHost *:80>
    ServerName irigatie.example.test
    ServerAdmin webmaster@example.test
    DocumentRoot /var/www/irigatie.example.test/public_html

    ErrorLog ${APACHE_LOG_DIR}/irigatie_app_error.log
    CustomLog ${APACHE_LOG_DIR}/irigatie_app_access.log combined

    ProxyPreserveHost On
    ProxyPass /api/ http://BACKEND_GATEWAY_HOST:8080/api/
    ProxyPassReverse /api/ http://BACKEND_GATEWAY_HOST:8080/api/

    <Directory "/var/www/irigatie.example.test/public_html">
        Options Indexes FollowSymLinks
        AllowOverride All

        <RequireAny>
            # Replace these with your own LAN/VPN networks.
            Require ip 192.0.2.0/24
            Require ip 198.51.100.0/24

            # External browser clients must log in before loading the web app.
            <RequireAll>
                AuthName "Restricted Irrigation App"
                AuthType Form
                AuthFormProvider file
                AuthUserFile /etc/apache2/irigatie_app.htpasswd

                Session On
                SessionCookieName irrigation_app_session path=/;HttpOnly;SameSite=Strict

                Require valid-user
            </RequireAll>
        </RequireAny>

        AuthFormLoginRequiredLocation "/login.html"

        <Files "do_login">
            SetHandler form-login-handler
            AuthFormLoginSuccessLocation "/"
        </Files>

        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_URI} !^/login.html$
        RewriteCond %{REQUEST_URI} !^/do_login$
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    # API calls must not be redirected to the Apache form login page.
    # The backend gateway should validate Authorization: Bearer <token>.
    <Location "/api/">
        AuthType None
        Require all granted
    </Location>

    <Location "/login.html">
        Require all granted
    </Location>

    # Deny direct browser access to local app config if you deploy one.
    <Files "irigatie_app.json">
        Require all denied
    </Files>
</VirtualHost>
