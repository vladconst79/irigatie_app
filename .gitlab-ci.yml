stages:
  - validate
  - build

variables:
  PUB_CACHE: "$CI_PROJECT_DIR/.pub-cache"
  FLUTTER_VERSION: "3.44.6"
  MACOS_FLUTTER_BIN: "/Users/vlad/develop/flutter/bin"

.flutter_linux:
  image: ghcr.io/cirruslabs/flutter:stable
  cache:
    key:
      files:
        - pubspec.lock
    paths:
      - .pub-cache/
      - .dart_tool/
  before_script:
    - export FLUTTER_ROOT="$(dirname "$(dirname "$(command -v flutter)")")"
    - git config --global --add safe.directory "$FLUTTER_ROOT"
    - git -C "$FLUTTER_ROOT" fetch --depth 1 origin "$FLUTTER_VERSION"
    - git -C "$FLUTTER_ROOT" checkout FETCH_HEAD
    - flutter --version
    - flutter pub get

analyze_test:
  extends: .flutter_linux
  stage: validate
  script:
    - dart format --set-exit-if-changed .
    - flutter analyze
    - flutter test

build_web:
  extends: .flutter_linux
  stage: build
  needs:
    - analyze_test
  script:
    - flutter build web --release
  artifacts:
    name: "irigatie-web-${CI_COMMIT_SHORT_SHA}"
    expire_in: 14 days
    paths:
      - build/web/

build_android_apk:
  extends: .flutter_linux
  stage: build
  needs:
    - analyze_test
  script:
    - flutter build apk --release
  artifacts:
    name: "irigatie-android-${CI_COMMIT_SHORT_SHA}"
    expire_in: 30 days
    paths:
      - build/app/outputs/flutter-apk/app-release.apk

# Requires a GitLab macOS runner with Xcode, CocoaPods, and Flutter installed.
# For a distributable IPA, configure Apple signing on that runner first.
build_ios_unsigned:
  stage: build
  tags:
    - macos
  needs:
    - analyze_test
  when: manual
  cache:
    key:
      files:
        - pubspec.lock
    paths:
      - .pub-cache/
      - .dart_tool/
  before_script:
    - export PATH="$MACOS_FLUTTER_BIN:$PATH"
    - test -x "$MACOS_FLUTTER_BIN/flutter"
    - flutter --version
    - flutter pub get
  script:
    - flutter build ios --release --no-codesign
  artifacts:
    name: "irigatie-ios-unsigned-${CI_COMMIT_SHORT_SHA}"
    expire_in: 14 days
    paths:
      - build/ios/iphoneos/Runner.app
