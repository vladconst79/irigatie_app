stages:
  - validate
  - build

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - when: never

variables:
  ARTIFACT_COMPRESSION_LEVEL: "fastest"
  CACHE_COMPRESSION_LEVEL: "fastest"
  FF_USE_FASTZIP: "true"
  GIT_DEPTH: "20"
  PUB_CACHE: "$CI_PROJECT_DIR/.pub-cache"
  MACOS_FLUTTER_BIN: "/Users/vlad/develop/flutter/bin"

.flutter_linux:
  image: ghcr.io/cirruslabs/flutter:stable
  interruptible: true
  cache:
    key:
      files:
        - pubspec.lock
    paths:
      - .pub-cache/
  before_script:
    - flutter config --no-analytics
    - dart --disable-analytics
    - flutter --version
    - flutter pub get
  after_script:
    - pkill -TERM -f flutter || true
    - pkill -TERM -f dart || true

analyze_test:
  extends: .flutter_linux
  stage: validate
  timeout: 1 hour
  script:
    - dart format --set-exit-if-changed .
    - flutter analyze
    - flutter test

build_web:
  extends: .flutter_linux
  stage: build
  timeout: 1 hour
  needs:
    - analyze_test
  script:
    - flutter build web --release
  artifacts:
    name: "irigatie-web-${CI_COMMIT_SHORT_SHA}"
    expire_in: 14 days
    paths:
      - build/web/

build_android_apk:
  extends: .flutter_linux
  stage: build
  timeout: 3 hours
  needs:
    - analyze_test
  script:
    - flutter build apk --release
  artifacts:
    name: "irigatie-android-${CI_COMMIT_SHORT_SHA}"
    expire_in: 30 days
    paths:
      - build/app/outputs/flutter-apk/app-release.apk

# Requires a GitLab macOS runner with Xcode and Flutter installed.
# For a distributable IPA, configure Apple signing on that runner first.
build_ios_unsigned:
  stage: build
  timeout: 2 hours
  tags:
    - macos
  needs:
    - analyze_test
  when: manual
  cache:
    key:
      files:
        - pubspec.lock
    paths:
      - .pub-cache/
      - .dart_tool/
      - .gem/
  before_script:
    - export PATH="/opt/homebrew/opt/ruby/bin:/usr/local/opt/ruby/bin:$MACOS_FLUTTER_BIN:$PATH"
    - export GEM_HOME="$CI_PROJECT_DIR/.gem"
    - export PATH="$GEM_HOME/bin:$PATH"
    - export LANG=en_US.UTF-8
    - export LC_ALL=en_US.UTF-8
    - ruby --version
    - gem --version
    - test -x "$MACOS_FLUTTER_BIN/flutter"
    - command -v pod || gem install cocoapods --no-document
    - pod --version
    - flutter --version
    - flutter pub get
  script:
    - flutter build ios --release --no-codesign
  artifacts:
    name: "irigatie-ios-unsigned-${CI_COMMIT_SHORT_SHA}"
    expire_in: 14 days
    paths:
      - build/ios/iphoneos/Runner.app
