<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f5f5f5; margin: 0; }
    .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
    .field { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; }
    input { width: 100%; padding: 0.5rem; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 0.75rem; background: #007acc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
  </style>
</head>
<body>
<div class="login-card">
  <form method="POST" action="/do_login">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="httpd_username" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="httpd_password" autocomplete="current-password" required>
    </div>
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
